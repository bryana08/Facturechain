<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FactureChain — Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #ff6b35;
            --orange-hover: #e85a2a;
            --navy-bg: #060b13;
            --navy-card: rgba(21, 28, 44, 0.8);
            --navy-input: #0a0f1a;
            --white: #ffffff;
            --grey: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --sans: 'Plus+Jakarta+Sans', sans-serif;
            --mono: 'JetBrains+Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--navy-bg);
            color: var(--white);
            font-family: var(--sans);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Arrière-plan dynamique */
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        .login-wrap::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.15) 0%, transparent 70%);
            top: -100px; left: -100px;
            z-index: 0;
        }

        .login-wrap::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 180, 216, 0.1) 0%, transparent 70%);
            bottom: -50px; right: -50px;
            z-index: 0;
        }

        .login-container {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .login-header { text-align: center; margin-bottom: 40px; }
        .login-logo { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
        .login-logo .ch { color: var(--orange); }
        .login-tagline { font-size: 14px; color: var(--grey); font-family: var(--mono); opacity: 0.8; }

        /* Card Glassmorphism */
        .login-card {
            background: var(--navy-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 14px;
            padding: 6px;
            margin-bottom: 32px;
            border: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--grey);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab.active {
            background: var(--orange);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        /* Form Elements */
        .form-panel { display: none; animation: fadeIn 0.4s ease-out; }
        .form-panel.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--grey); }
        
        .form-input, .form-select {
            width: 100%;
            background: var(--navy-input);
            border: 1px solid var(--border);
            padding: 14px 16px;
            border-radius: 12px;
            color: white;
            font-family: var(--sans);
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--orange);
            box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
        }

        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        /* Avatar */
        .avatar-upload {
            display: flex; flex-direction: column; align-items: center; margin-bottom: 24px;
        }
        .avatar-circle {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--navy-input);
            border: 2px dashed var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; cursor: pointer; transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .avatar-circle:hover { border-color: var(--orange); background: rgba(255,107,53,0.05); }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }
        .btn-orange {
            background: linear-gradient(135deg, var(--orange), #f9844a);
            color: white;
        }
        .btn-orange:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 53, 0.3);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            margin-top: 12px;
        }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        .forgot { text-align: right; margin: -10px 0 20px; }
        .forgot a { font-size: 12px; color: var(--orange); text-decoration: none; font-family: var(--mono); }

        .divider {
            display: flex; align-items: center; gap: 15px; margin: 24px 0;
            color: var(--grey); font-size: 11px; font-family: var(--mono); text-transform: uppercase;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .form-error { color: #ff4d4d; font-size: 11px; margin-top: 5px; display: none; }
        .form-error.show { display: block; }

        .success-msg { text-align: center; display: none; padding: 20px; }
        .success-msg .icon { font-size: 48px; margin-bottom: 16px; }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="login-container">

        <div class="login-header">
            <div class="login-logo">Facture<span class="ch">Chain</span></div>
            <div class="login-tagline">Vérification Blockchain ENEO Cameroon</div>
        </div>

        <div class="login-card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('connexion')">Connexion</button>
                <button class="tab" onclick="switchTab('inscription')">Inscription</button>
            </div>

            <div class="form-panel active" id="panel-connexion">
                <div class="form-group">
                    <label class="form-label">Email ou Contrat</label>
                    <input type="text" class="form-input" id="login-email" placeholder="nom@exemple.cm">
                    <div class="form-error" id="err-login-email">Veuillez entrer vos identifiants</div>
                </div>
                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" class="form-input" id="login-password" placeholder="••••••••">
                    <div class="form-error" id="err-login-pwd">Mot de passe requis</div>
                </div>
                <div class="forgot"><a href="#">Identifiants perdus ?</a></div>
                
                <button class="btn btn-orange" onclick="connexion()">
                    Se connecter 
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>

                <div class="divider">ou explorer</div>
                
                <button class="btn btn-outline" onclick="connexionDemo()">
                    🚀 Accéder à la démo
                </button>
            </div>

            <div class="form-panel" id="panel-inscription">
                <div class="avatar-upload">
                    <div class="avatar-circle" onclick="document.getElementById('avatar-input').click()">
                        <span id="avatarEmoji">👤</span>
                        <img id="avatarPreview" style="display:none">
                    </div>
                    <input type="file" id="avatar-input" hidden onchange="previewAvatar(this)">
                </div>

                <div class="row-2">
                    <div class="form-group">
                        <label class="form-label">Prénom</label>
                        <input type="text" class="form-input" id="reg-prenom" placeholder="Jean">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nom</label>
                        <input type="text" class="form-input" id="reg-nom" placeholder="Mbarga">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Numéro de Contrat ENEO</label>
                    <input type="text" class="form-input" id="reg-contrat" placeholder="CMR-YDE-XXXXXXX">
                </div>

                <div class="form-group">
                    <label class="form-label">Ville</label>
                    <select class="form-select" id="reg-ville">
                        <option value="">Choisir...</option>
                        <option>Yaoundé</option>
                        <option>Douala</option>
                        <option>Bafoussam</option>
                        <option>Garoua</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" class="form-input" id="reg-pwd" placeholder="Min. 6 caractères">
                </div>

                <button class="btn btn-orange" onclick="inscription()">
                    Créer mon compte
                </button>

                <div id="success-inscription" class="success-msg">
                    <div class="icon">✨</div>
                    <p>Compte créé avec succès !</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Logique de changement d'onglet
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => {
            t.classList.toggle('active', (tab === 'connexion' && t.innerText === 'Connexion') || (tab === 'inscription' && t.innerText === 'Inscription'));
        });
        document.getElementById('panel-connexion').classList.toggle('active', tab === 'connexion');
        document.getElementById('panel-inscription').classList.toggle('active', tab === 'inscription');
    }

    // Preview Image
    function previewAvatar(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('avatarPreview');
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('avatarEmoji').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Les fonctions de connexion/inscription restent similaires à ton app.js
    function connexion() {
        // Ajoute ici ta logique de redirection
        const btn = event.currentTarget;
        btn.innerHTML = "Chargement...";
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
    }
</script>

</body>
</html>
